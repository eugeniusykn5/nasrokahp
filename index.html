<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SPK AHP Multi-Expert</title>
  <style>
    :root {
      --bg: #f4f8f6;
      --card: #ffffff;
      --ink: #13231a;
      --muted: #4d6054;
      --line: #cfe0d6;
      --brand: #166a45;
      --warn: #b45309;
      --good: #166534;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, sans-serif;
      color: var(--ink);
      background:
        radial-gradient(1200px 500px at -10% -20%, #dff3e8 0%, transparent 55%),
        radial-gradient(800px 400px at 110% 0%, #dbefe4 0%, transparent 45%),
        var(--bg);
      padding: 24px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      display: grid;
      gap: 16px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 16px;
      box-shadow: 0 6px 20px rgba(22, 106, 69, 0.08);
    }

    h1, h2, h3 { margin: 0 0 10px 0; }
    h1 { font-size: 1.5rem; }
    h2 { font-size: 1.1rem; color: var(--brand); }
    h3 { font-size: 1rem; color: var(--muted); }

    .grid {
      display: grid;
      gap: 12px;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    }

    label { font-size: 0.9rem; color: var(--muted); display: block; margin-bottom: 5px; }
    input, select, button {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #bfd3c7;
      font-size: 0.95rem;
    }

    button {
      background: var(--brand);
      color: #fff;
      font-weight: 600;
      border: none;
      cursor: pointer;
    }

    button:hover { filter: brightness(0.95); }

    .btn-secondary {
      background: #edf6f1;
      color: #17553a;
      border: 1px solid #bcd8c9;
    }

    .matrix-wrap {
      overflow-x: auto;
      border: 1px solid var(--line);
      border-radius: 10px;
      margin-top: 8px;
    }

    table {
      border-collapse: collapse;
      width: max-content;
      min-width: 100%;
    }

    th, td {
      border: 1px solid var(--line);
      padding: 6px;
      text-align: center;
      min-width: 90px;
      font-size: 0.9rem;
    }

    th {
      background: #e9f5ef;
      position: sticky;
      top: 0;
      z-index: 1;
    }

    .readonly {
      background: #f1f6f3;
      color: #355144;
      font-size: 0.85rem;
      padding: 7px;
      border-radius: 6px;
      border: 1px dashed #b9cec2;
    }

    .small { font-size: 0.85rem; color: var(--muted); }
    .warn { color: var(--warn); font-weight: 700; }
    .good { color: var(--good); font-weight: 700; }
    .result-box {
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      margin-bottom: 8px;
      background: #fbfefc;
    }

    .summary-grid {
      display: grid;
      gap: 10px;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      margin-bottom: 8px;
    }

    .metric {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px;
      background: #f7fcf9;
    }

    .metric .label {
      display: block;
      font-size: 0.8rem;
      color: var(--muted);
      margin-bottom: 4px;
    }

    .metric .value {
      font-size: 1.15rem;
      font-weight: 700;
      color: var(--brand);
    }

    .chart {
      display: grid;
      gap: 8px;
      margin-top: 10px;
    }

    .bar-row {
      display: grid;
      grid-template-columns: 160px 1fr 90px;
      gap: 8px;
      align-items: center;
    }

    .bar-label {
      font-size: 0.9rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .bar-track {
      height: 16px;
      border-radius: 999px;
      background: #dfeee5;
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #1f7a52, #3fae77);
    }

    .bar-val {
      text-align: right;
      font-weight: 600;
      font-size: 0.85rem;
      color: #1f5138;
    }

    .tab-head {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 10px;
    }

    .tab-btn {
      width: auto;
      padding: 8px 12px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: #f4fbf7;
      color: #1b5f40;
      font-weight: 600;
    }

    .tab-btn.active {
      background: var(--brand);
      color: #fff;
      border-color: var(--brand);
    }

    .tab-panel {
      display: none;
    }

    .tab-panel.active {
      display: block;
    }

    .hierarchy-viz {
      position: relative;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #f8fbfa;
      padding: 14px;
      overflow-x: auto;
    }

    .hierarchy-board {
      min-width: 760px;
      position: relative;
      display: grid;
      gap: 16px;
      z-index: 1;
    }

    .hier-row {
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
      position: relative;
      z-index: 2;
    }

    .hier-node {
      border: 2px solid #2e7d57;
      border-radius: 14px;
      background: #ffffff;
      padding: 10px 14px;
      min-width: 150px;
      text-align: center;
      box-shadow: 0 2px 8px rgba(22, 106, 69, 0.08);
    }

    .hier-node.goal {
      min-width: 320px;
      border-color: #bc6a3e;
      background: #fff7f2;
    }

    .hier-node.criteria {
      border-color: #2f6fb6;
      background: #f2f8ff;
    }

    .hier-node.alt {
      border-color: #608f3c;
      background: #f6fbf1;
    }

    .hier-node.alt.top {
      border-color: #2d7b2d;
      background: #eef8ea;
    }

    .node-title {
      font-weight: 700;
      color: #183526;
      margin-bottom: 4px;
    }

    .node-sub {
      font-size: 0.86rem;
      color: #37624c;
    }

    .hier-svg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    .stage-label {
      font-size: 0.8rem;
      color: #4d6054;
      font-weight: 700;
      text-align: left;
      margin-left: 4px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <h1>SPK Metode AHP Multi-Expert</h1>
      <p class="small">Aplikasi ini menghitung bobot kriteria dengan AHP dari beberapa expert (agregasi geometric mean), lalu memberi peringkat alternatif dari nilai performa tiap kriteria.</p>
    </div>

    <div class="card">
      <h2>1) Konfigurasi</h2>
      <div class="grid">
        <div>
          <label for="goalName">Goal / Tujuan</label>
          <input id="goalName" type="text" value="Memilih Alternatif Terbaik" />
        </div>
        <div>
          <label for="expertCount">Jumlah expert (1-10)</label>
          <input id="expertCount" type="number" min="1" max="10" value="2" />
        </div>
        <div>
          <label for="criteriaNames">Nama kriteria (pisahkan dengan koma)</label>
          <input id="criteriaNames" type="text" value="Harga,Kualitas,Layanan" />
        </div>
        <div>
          <label for="alternativeNames">Nama alternatif (pisahkan dengan koma)</label>
          <input id="alternativeNames" type="text" value="Axway,IBM API Connect,Kong Enterprise" />
        </div>
      </div>
      <div style="margin-top:10px;">
        <button id="generateBtn">Buat Form AHP</button>
      </div>
      <div class="grid" style="margin-top:10px;">
        <div>
          <button id="downloadCsvBtn" class="btn-secondary" type="button">Simpan Input ke CSV</button>
        </div>
        <div>
          <button id="uploadCsvBtn" class="btn-secondary" type="button">Upload Data CSV</button>
          <input id="uploadCsvInput" type="file" accept=".csv,text/csv" style="display:none;" />
        </div>
      </div>
    </div>

    <div id="expertSection" class="card" style="display:none;"></div>
    <div id="scoreSection" class="card" style="display:none;"></div>
    <div id="resultSection" class="card" style="display:none;"></div>
  </div>

  <script>
    const RI = {
      1: 0.00, 2: 0.00, 3: 0.58, 4: 0.90, 5: 1.12,
      6: 1.24, 7: 1.32, 8: 1.41, 9: 1.45, 10: 1.49
    };

    const state = {
      goal: "",
      nCriteria: 0,
      nAlternatives: 0,
      nExperts: 0,
      criteria: [],
      alternatives: []
    };

    const generateBtn = document.getElementById("generateBtn");
    const downloadCsvBtn = document.getElementById("downloadCsvBtn");
    const uploadCsvBtn = document.getElementById("uploadCsvBtn");
    const uploadCsvInput = document.getElementById("uploadCsvInput");
    const expertSection = document.getElementById("expertSection");
    const scoreSection = document.getElementById("scoreSection");
    const resultSection = document.getElementById("resultSection");

    function parseNames(input) {
      return input.split(",").map(s => s.trim()).filter(Boolean);
    }

    function fmt(num, digit = 4) {
      return Number(num).toFixed(digit);
    }

    function fmtPct(num, digit = 2) {
      return `${(Number(num) * 100).toFixed(digit)}%`;
    }

    function parsePairValue(raw) {
      const s = String(raw || "").trim();
      if (!s) return 1;

      if (s.includes("/")) {
        const parts = s.split("/").map(x => x.trim());
        if (parts.length === 2) {
          const a = Number(parts[0]);
          const b = Number(parts[1]);
          if (Number.isFinite(a) && Number.isFinite(b) && b !== 0) {
            const v = a / b;
            return v > 0 ? v : 1;
          }
        }
      }

      const n = Number(s);
      if (!Number.isFinite(n) || n <= 0) return 1;
      return n;
    }

    function displayPairValue(val) {
      return fmt(val, 4);
    }

    function buildRankingBars(ranking) {
      const maxScore = Math.max(...ranking.map(x => x.score), 1e-9);
      return `<div class='chart'>${ranking.map(item => {
        const w = (item.score / maxScore) * 100;
        return `
          <div class='bar-row'>
            <div class='bar-label'>${item.name}</div>
            <div class='bar-track'><div class='bar-fill' style='width:${w}%;'></div></div>
            <div class='bar-val'>${fmtPct(item.score)}</div>
          </div>
        `;
      }).join("")}</div>`;
    }

    function initExpertTabs() {
      const tabButtons = Array.from(document.querySelectorAll(".tab-btn"));
      const tabPanels = Array.from(document.querySelectorAll(".tab-panel"));
      if (!tabButtons.length) return;

      function setActive(targetId) {
        tabButtons.forEach(btn => btn.classList.toggle("active", btn.dataset.target === targetId));
        tabPanels.forEach(panel => panel.classList.toggle("active", panel.id === targetId));
      }

      tabButtons.forEach(btn => {
        btn.addEventListener("click", () => setActive(btn.dataset.target));
      });

      setActive(tabButtons[0].dataset.target);
    }

    function csvEscape(value) {
      const s = String(value ?? "");
      if (/[\",\\n]/.test(s)) return `"${s.replace(/\"/g, "\"\"")}"`;
      return s;
    }

    function toCsvLine(values) {
      return values.map(csvEscape).join(",");
    }

    function parseCsv(text) {
      const rows = [];
      let row = [];
      let field = "";
      let i = 0;
      let inQuotes = false;

      while (i < text.length) {
        const ch = text[i];
        const next = text[i + 1];

        if (inQuotes) {
          if (ch === "\"" && next === "\"") {
            field += "\"";
            i += 2;
            continue;
          }
          if (ch === "\"") {
            inQuotes = false;
            i += 1;
            continue;
          }
          field += ch;
          i += 1;
          continue;
        }

        if (ch === "\"") {
          inQuotes = true;
          i += 1;
          continue;
        }
        if (ch === ",") {
          row.push(field);
          field = "";
          i += 1;
          continue;
        }
        if (ch === "\n" || ch === "\r") {
          if (ch === "\r" && next === "\n") i += 1;
          row.push(field);
          if (row.some(x => String(x).trim() !== "")) rows.push(row);
          row = [];
          field = "";
          i += 1;
          continue;
        }

        field += ch;
        i += 1;
      }

      row.push(field);
      if (row.some(x => String(x).trim() !== "")) rows.push(row);
      return rows;
    }

    function collectDataForCsv() {
      const goal = String(document.getElementById("goalName").value || "").trim() || "Memilih Alternatif Terbaik";
      const nExperts = Number(document.getElementById("expertCount").value) || state.nExperts;
      const criteria = parseNames(document.getElementById("criteriaNames").value);
      const alternatives = parseNames(document.getElementById("alternativeNames").value);

      if (!criteria.length || !alternatives.length || !nExperts) {
        throw new Error("Konfigurasi belum lengkap.");
      }

      const lines = [];
      lines.push(toCsvLine(["AHP_MULTI_EXPERT", "1"]));
      lines.push(toCsvLine(["GOAL", goal]));
      lines.push(toCsvLine(["EXPERTS", nExperts]));
      lines.push(toCsvLine(["CRITERIA", ...criteria]));
      lines.push(toCsvLine(["ALTERNATIVES", ...alternatives]));

      for (let ex = 0; ex < nExperts; ex++) {
        for (let i = 0; i < criteria.length; i++) {
          for (let j = i + 1; j < criteria.length; j++) {
            const input = document.querySelector(`input[data-matrix='criteria-ex${ex}'][data-i='${i}'][data-j='${j}']`);
            const value = input ? input.value : "1";
            lines.push(toCsvLine(["CRITERIA_PAIR", ex, i, j, value]));
          }
        }
      }

      for (let ex = 0; ex < nExperts; ex++) {
        for (let c = 0; c < criteria.length; c++) {
          for (let i = 0; i < alternatives.length; i++) {
            for (let j = i + 1; j < alternatives.length; j++) {
              const input = document.querySelector(`input[data-matrix='alt-c${c}-ex${ex}'][data-i='${i}'][data-j='${j}']`);
              const value = input ? input.value : "1";
              lines.push(toCsvLine(["ALT_PAIR", ex, c, i, j, value]));
            }
          }
        }
      }

      return lines.join("\n");
    }

    function downloadCsv() {
      try {
        const csv = collectDataForCsv();
        const blob = new Blob([csv], { type: "text/csv;charset=utf-8;" });
        const url = URL.createObjectURL(blob);
        const goalRaw = String(document.getElementById("goalName").value || "").trim() || "goal";
        const goalSafe = goalRaw
          .replace(/\s+/g, "_")
          .replace(/[^a-zA-Z0-9_-]/g, "")
          .replace(/_+/g, "_")
          .replace(/^_+|_+$/g, "") || "goal";
        const now = new Date();
        const hh = String(now.getHours()).padStart(2, "0");
        const mm = String(now.getMinutes()).padStart(2, "0");
        const ss = String(now.getSeconds()).padStart(2, "0");
        const fileName = `${goalSafe}_${hh}${mm}${ss}.csv`;
        const a = document.createElement("a");
        a.href = url;
        a.download = fileName;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
      } catch (err) {
        alert(`Gagal membuat CSV: ${err.message}`);
      }
    }

    function applyPairValue(matrixKey, i, j, value) {
      const input = document.querySelector(`input[data-matrix='${matrixKey}'][data-i='${i}'][data-j='${j}']`);
      if (!input) return;
      input.value = value;
      syncMirrorCell(matrixKey, Number(i), Number(j), parsePairValue(value));
    }

    function importCsvText(text) {
      const rows = parseCsv(text);
      if (!rows.length) throw new Error("File CSV kosong.");

      const first = rows[0];
      if (first[0] !== "AHP_MULTI_EXPERT") {
        throw new Error("Format CSV tidak dikenali.");
      }

      let goal = "Memilih Alternatif Terbaik";
      let experts = 0;
      let criteria = [];
      let alternatives = [];
      const criteriaPairs = [];
      const altPairs = [];

      rows.slice(1).forEach(cols => {
        const tag = cols[0];
        if (tag === "GOAL") goal = cols[1] || goal;
        else if (tag === "EXPERTS") experts = Number(cols[1] || 0);
        else if (tag === "CRITERIA") criteria = cols.slice(1).filter(Boolean);
        else if (tag === "ALTERNATIVES") alternatives = cols.slice(1).filter(Boolean);
        else if (tag === "CRITERIA_PAIR") criteriaPairs.push(cols);
        else if (tag === "ALT_PAIR") altPairs.push(cols);
      });

      if (!experts || criteria.length < 2 || alternatives.length < 2) {
        throw new Error("Data konfigurasi CSV tidak valid.");
      }

      document.getElementById("goalName").value = goal;
      document.getElementById("expertCount").value = String(experts);
      document.getElementById("criteriaNames").value = criteria.join(",");
      document.getElementById("alternativeNames").value = alternatives.join(",");

      generateForms();

      criteriaPairs.forEach(cols => {
        const ex = Number(cols[1]);
        const i = Number(cols[2]);
        const j = Number(cols[3]);
        const v = cols[4] ?? "1";
        applyPairValue(`criteria-ex${ex}`, i, j, v);
      });

      altPairs.forEach(cols => {
        const ex = Number(cols[1]);
        const c = Number(cols[2]);
        const i = Number(cols[3]);
        const j = Number(cols[4]);
        const v = cols[5] ?? "1";
        applyPairValue(`alt-c${c}-ex${ex}`, i, j, v);
      });
    }

    function nodePoint(el, parentRect, pointType) {
      const r = el.getBoundingClientRect();
      const cx = r.left - parentRect.left + (r.width / 2);
      const top = r.top - parentRect.top;
      const bottom = top + r.height;
      return pointType === "top" ? { x: cx, y: top } : { x: cx, y: bottom };
    }

    function buildHierarchyLines(container) {
      const board = container.querySelector(".hierarchy-board");
      const svg = container.querySelector(".hier-svg");
      if (!board || !svg) return;

      const boardRect = board.getBoundingClientRect();
      svg.setAttribute("viewBox", `0 0 ${Math.ceil(boardRect.width)} ${Math.ceil(boardRect.height)}`);
      svg.innerHTML = "";

      const goalNode = board.querySelector("[data-node='goal']");
      const criteriaNodes = Array.from(board.querySelectorAll("[data-node^='crit-']"));
      const altNodes = Array.from(board.querySelectorAll("[data-node^='alt-']"));
      if (!goalNode || !criteriaNodes.length || !altNodes.length) return;

      const goalBottom = nodePoint(goalNode, boardRect, "bottom");

      criteriaNodes.forEach(cNode => {
        const cTop = nodePoint(cNode, boardRect, "top");
        const cBottom = nodePoint(cNode, boardRect, "bottom");
        const l1 = document.createElementNS("http://www.w3.org/2000/svg", "line");
        l1.setAttribute("x1", goalBottom.x);
        l1.setAttribute("y1", goalBottom.y);
        l1.setAttribute("x2", cTop.x);
        l1.setAttribute("y2", cTop.y);
        l1.setAttribute("stroke", "#9aa5a0");
        l1.setAttribute("stroke-width", "1.5");
        svg.appendChild(l1);

        altNodes.forEach(aNode => {
          const aTop = nodePoint(aNode, boardRect, "top");
          const l2 = document.createElementNS("http://www.w3.org/2000/svg", "line");
          l2.setAttribute("x1", cBottom.x);
          l2.setAttribute("y1", cBottom.y);
          l2.setAttribute("x2", aTop.x);
          l2.setAttribute("y2", aTop.y);
          l2.setAttribute("stroke", "#d0d6d3");
          l2.setAttribute("stroke-width", "1.2");
          svg.appendChild(l2);
        });
      });
    }

    function renderHierarchyViz(criteriaWeights, finalScores) {
      const target = document.getElementById("hierarchyViz");
      if (!target) return;
      const topScore = Math.max(...finalScores, 0);

      const critHtml = state.criteria.map((name, idx) => `
        <div class='hier-node criteria' data-node='crit-${idx}'>
          <div class='node-title'>${name}</div>
          <div class='node-sub'>${fmtPct(criteriaWeights[idx])}</div>
        </div>
      `).join("");

      const altHtml = state.alternatives.map((name, idx) => `
        <div class='hier-node alt ${finalScores[idx] === topScore ? "top" : ""}' data-node='alt-${idx}'>
          <div class='node-title'>${name}</div>
          <div class='node-sub'>${fmtPct(finalScores[idx])}</div>
        </div>
      `).join("");

      target.innerHTML = `
        <div class='hierarchy-board'>
          <svg class='hier-svg'></svg>
          <div class='stage-label'>Goal</div>
          <div class='hier-row'>
            <div class='hier-node goal' data-node='goal'>
              <div class='node-title'>${state.goal}</div>
              <div class='node-sub'>AHP Multi-Expert Decision</div>
            </div>
          </div>
          <div class='stage-label'>Criteria</div>
          <div class='hier-row'>${critHtml}</div>
          <div class='stage-label'>Alternatives</div>
          <div class='hier-row'>${altHtml}</div>
        </div>
      `;

      requestAnimationFrame(() => buildHierarchyLines(target));
    }

    window.addEventListener("resize", () => {
      const target = document.getElementById("hierarchyViz");
      if (target) requestAnimationFrame(() => buildHierarchyLines(target));
    });

    function buildMatrixTable(matrixKey, names, firstColLabel) {
      const n = names.length;
      const wrap = document.createElement("div");
      wrap.className = "matrix-wrap";
      const table = document.createElement("table");
      const thead = document.createElement("thead");
      const trh = document.createElement("tr");
      trh.innerHTML = `<th>${firstColLabel}</th>${names.map(nm => `<th>${nm}</th>`).join("")}`;
      thead.appendChild(trh);
      table.appendChild(thead);

      const tbody = document.createElement("tbody");

      for (let i = 0; i < n; i++) {
        const tr = document.createElement("tr");
        const rowHead = document.createElement("th");
        rowHead.textContent = names[i];
        tr.appendChild(rowHead);

        for (let j = 0; j < n; j++) {
          const td = document.createElement("td");
          if (i === j) {
            td.innerHTML = `<div class="readonly">1</div>`;
          } else if (i < j) {
            const input = document.createElement("input");
            input.type = "text";
            input.value = "1";
            input.placeholder = "mis. 3 atau 1/3";
            input.dataset.matrix = matrixKey;
            input.dataset.i = i;
            input.dataset.j = j;
            td.appendChild(input);
          } else {
            td.id = `mirror-${matrixKey}-${i}-${j}`;
            td.innerHTML = `<div class="readonly">1</div>`;
          }
          tr.appendChild(td);
        }
        tbody.appendChild(tr);
      }

      table.appendChild(tbody);
      wrap.appendChild(table);
      return wrap;
    }

    function syncMirrorCell(matrixKey, i, j, val) {
      const mirror = document.getElementById(`mirror-${matrixKey}-${j}-${i}`);
      if (mirror) {
        mirror.innerHTML = `<div class="readonly">${displayPairValue(1 / val)}</div>`;
      }
    }

    function readMatrix(matrixKey, n) {
      const m = Array.from({ length: n }, () => Array(n).fill(1));
      for (let i = 0; i < n; i++) {
        for (let j = i + 1; j < n; j++) {
          const input = document.querySelector(`input[data-matrix='${matrixKey}'][data-i='${i}'][data-j='${j}']`);
          const v = parsePairValue(input.value);
          m[i][j] = v;
          m[j][i] = 1 / v;
        }
      }
      return m;
    }

    function computeWeights(matrix) {
      const n = matrix.length;
      const gms = matrix.map(row => {
        const prod = row.reduce((acc, v) => acc * v, 1);
        return Math.pow(prod, 1 / n);
      });

      const gmSum = gms.reduce((a, b) => a + b, 0);
      const weights = gms.map(v => v / gmSum);

      const aw = matrix.map(row => row.reduce((sum, v, j) => sum + v * weights[j], 0));
      const lambdaMax = aw.reduce((sum, v, i) => sum + (v / weights[i]), 0) / n;
      const ci = (lambdaMax - n) / (n - 1);
      const ri = RI[n] || 1.49;
      const cr = ri === 0 ? 0 : ci / ri;

      return { weights, lambdaMax, ci, cr };
    }

    function aggregateMatrices(matrices) {
      const e = matrices.length;
      const n = matrices[0].length;
      const agg = Array.from({ length: n }, () => Array(n).fill(1));

      for (let i = 0; i < n; i++) {
        for (let j = 0; j < n; j++) {
          let prod = 1;
          for (let k = 0; k < e; k++) prod *= matrices[k][i][j];
          agg[i][j] = Math.pow(prod, 1 / e);
        }
      }
      return agg;
    }

    function generateForms() {
      const goal = String(document.getElementById("goalName").value || "").trim();
      const nExperts = Number(document.getElementById("expertCount").value);
      const criteria = parseNames(document.getElementById("criteriaNames").value);
      const alternatives = parseNames(document.getElementById("alternativeNames").value);
      const nCriteria = criteria.length;
      const nAlternatives = alternatives.length;

      if (nCriteria < 2 || nCriteria > 10) {
        alert("Jumlah kriteria harus 2-10 item dari input nama kriteria.");
        return;
      }

      if (nAlternatives < 2 || nAlternatives > 20) {
        alert("Jumlah alternatif harus 2-20 item dari input nama alternatif.");
        return;
      }

      if (nExperts < 1 || nExperts > 10) {
        alert("Jumlah expert harus 1-10.");
        return;
      }

      state.goal = goal || "Memilih Alternatif Terbaik";
      state.nCriteria = nCriteria;
      state.nAlternatives = nAlternatives;
      state.nExperts = nExperts;
      state.criteria = criteria;
      state.alternatives = alternatives;

      expertSection.style.display = "block";
      scoreSection.style.display = "none";
      resultSection.style.display = "none";

      expertSection.innerHTML = `<h2>2) Input Perbandingan Berpasangan (Grouping per Expert)</h2><p class='small'>Setiap expert mengisi matriks kriteria dan matriks alternatif terhadap tiap kriteria. Isi hanya segitiga atas, nilai kebalikannya otomatis.</p>`;
      for (let ex = 0; ex < nExperts; ex++) {
        const expertBlock = document.createElement("div");
        expertBlock.className = "result-box";
        expertBlock.innerHTML = `<h3>Expert ${ex + 1}</h3>`;

        const critTitle = document.createElement("div");
        critTitle.className = "small";
        critTitle.style.marginBottom = "6px";
        critTitle.innerHTML = "<strong>Matriks Kriteria</strong>";
        expertBlock.appendChild(critTitle);
        expertBlock.appendChild(buildMatrixTable(`criteria-ex${ex}`, state.criteria, "Kriteria"));

        for (let c = 0; c < state.nCriteria; c++) {
          const altTitle = document.createElement("div");
          altTitle.className = "small";
          altTitle.style.margin = "10px 0 6px 0";
          altTitle.innerHTML = `<strong>Alternatif terhadap kriteria: ${state.criteria[c]}</strong>`;
          expertBlock.appendChild(altTitle);
          expertBlock.appendChild(buildMatrixTable(`alt-c${c}-ex${ex}`, state.alternatives, "Alternatif"));
        }

        expertSection.appendChild(expertBlock);
      }

      const calcBtn = document.createElement("button");
      calcBtn.textContent = "Hitung Bobot AHP + Ranking Alternatif";
      calcBtn.addEventListener("click", calculateAll);
      expertSection.appendChild(calcBtn);

      document.querySelectorAll("input[data-matrix]").forEach(input => {
        const matrixKey = input.dataset.matrix;
        const i = Number(input.dataset.i);
        const j = Number(input.dataset.j);
        syncMirrorCell(matrixKey, i, j, parsePairValue(input.value));
        input.addEventListener("input", e => {
          syncMirrorCell(matrixKey, i, j, parsePairValue(e.target.value));
        });
      });
    }

    function calculateAll() {
      const criteriaMatrices = [];
      const criteriaExpertResults = [];

      for (let ex = 0; ex < state.nExperts; ex++) {
        const m = readMatrix(`criteria-ex${ex}`, state.nCriteria);
        criteriaMatrices.push(m);
        criteriaExpertResults.push(computeWeights(m));
      }

      const aggCriteria = aggregateMatrices(criteriaMatrices);
      const aggCriteriaResult = computeWeights(aggCriteria);

      const altWeightsPerCriterion = [];
      const altConsistencyByCriterion = [];

      for (let c = 0; c < state.nCriteria; c++) {
        const matrices = [];
        const expertResults = [];

        for (let ex = 0; ex < state.nExperts; ex++) {
          const m = readMatrix(`alt-c${c}-ex${ex}`, state.nAlternatives);
          matrices.push(m);
          expertResults.push(computeWeights(m));
        }

        const aggAlt = aggregateMatrices(matrices);
        const aggAltResult = computeWeights(aggAlt);
        altWeightsPerCriterion.push(aggAltResult.weights);
        altConsistencyByCriterion.push({
          criterionName: state.criteria[c],
          expertResults,
          aggResult: aggAltResult
        });
      }

      const contributionMatrix = state.criteria.map((_, cIdx) =>
        state.alternatives.map((_, altIdx) =>
          aggCriteriaResult.weights[cIdx] * altWeightsPerCriterion[cIdx][altIdx]
        )
      );

      const finalScores = state.alternatives.map((_, altIdx) =>
        contributionMatrix.reduce((sum, row) => sum + row[altIdx], 0)
      );

      const ranking = state.alternatives.map((name, i) => ({
        name,
        score: finalScores[i]
      })).sort((a, b) => b.score - a.score);

      renderResult(criteriaExpertResults, aggCriteriaResult, altConsistencyByCriterion, ranking, contributionMatrix, finalScores);
    }

    function renderResult(criteriaExpertResults, aggCriteriaResult, altConsistencyByCriterion, ranking, contributionMatrix, finalScores) {
      resultSection.style.display = "block";
      let html = `<h2>4) Hasil Perhitungan</h2>`;

      html += `<div class='result-box'><h3>Ringkasan Ranking</h3>`;
      html += `<div class='summary-grid'>
        <div class='metric'><span class='label'>Peringkat 1</span><span class='value'>${ranking[0].name}</span></div>
        <div class='metric'><span class='label'>Skor Akhir</span><span class='value'>${fmtPct(ranking[0].score)}</span></div>
        <div class='metric'><span class='label'>Jumlah Expert</span><span class='value'>${state.nExperts}</span></div>
      </div>`;
      html += buildRankingBars(ranking);
      html += `<div class='matrix-wrap'><table><thead><tr><th>Peringkat</th><th>Alternatif</th><th>Skor (Angka)</th><th>Skor (%)</th></tr></thead><tbody>`;
      ranking.forEach((item, idx) => {
        html += `<tr><td>${idx + 1}</td><td>${item.name}</td><td>${fmt(item.score)}</td><td>${fmtPct(item.score)}</td></tr>`;
      });
      html += `</tbody></table></div></div>`;

      html += `<div class='result-box'><h3>Visualisasi Hierarki AHP</h3><div id='hierarchyViz' class='hierarchy-viz'></div></div>`;

      html += `<div class='result-box'><h3>Hasil Agregasi Multi-Expert</h3>`;
      html += `<p><strong>Priorities by criterion (Agregasi)</strong></p>`;
      html += `<div class='matrix-wrap'><table><thead><tr><th>Kriteria</th><th>Bobot (Angka)</th><th>Bobot (%)</th></tr></thead><tbody>`;
      state.criteria.forEach((c, i) => {
        html += `<tr><td>${c}</td><td>${fmt(aggCriteriaResult.weights[i])}</td><td>${fmtPct(aggCriteriaResult.weights[i])}</td></tr>`;
      });
      html += `</tbody></table></div>`;
      const statusAgg = aggCriteriaResult.cr <= 0.1 ? `<span class='good'>Konsisten</span>` : `<span class='warn'>Tidak konsisten</span>`;
      const aggText = aggCriteriaResult.cr < 0.1
        ? "Derajat konsistensi agregasi dapat diterima (<10%)."
        : "Derajat konsistensi agregasi belum dapat diterima (>=10%).";
      html += `<p class='small'>Consistency Ratio Agregasi: ${fmt(aggCriteriaResult.cr)} (${fmtPct(aggCriteriaResult.cr)}) -> ${statusAgg}</p>`;
      html += `<p class='small'>${aggText}</p>`;

      html += `<p><strong>Priorities by Alternatives (Agregasi)</strong></p>`;
      html += `<div class='matrix-wrap'><table><thead><tr><th>Crit./Alt.</th>${state.alternatives.map(alt => `<th>${alt}</th>`).join("")}<th>IC</th><th>CR</th></tr></thead><tbody>`;
      state.criteria.forEach((criterion, cIdx) => {
        const aggAltRes = altConsistencyByCriterion[cIdx].aggResult;
        html += `<tr><th>${criterion}</th>`;
        state.alternatives.forEach((_, aIdx) => {
          const v = aggCriteriaResult.weights[cIdx] * aggAltRes.weights[aIdx] * 100;
          html += `<td>${fmt(v, 2)}</td>`;
        });
        html += `<td>${fmt(aggAltRes.ci, 4)}</td><td>${fmtPct(aggAltRes.cr)}</td></tr>`;
      });
      html += `<tr><th>TOTAL</th>`;
      state.alternatives.forEach((_, aIdx) => {
        html += `<th>${fmtPct(finalScores[aIdx])}</th>`;
      });
      html += `<th>-</th><th>-</th></tr>`;
      html += `</tbody></table></div>`;
      const aggAltConsistent = altConsistencyByCriterion.every(item => item.aggResult.cr < 0.1);
      html += `<p class='small'>The degree of consistency is ${aggAltConsistent ? "acceptable (<10%)" : "not acceptable (>=10%)"}, therefore the decision process ${aggAltConsistent ? "can continue" : "should be reviewed"}.</p>`;

      altConsistencyByCriterion.forEach(item => {
        const isAcceptable = item.aggResult.cr < 0.1;
        const consistencyText = isAcceptable
          ? "Derajat konsistensi agregasi dapat diterima (<10%)."
          : "Derajat konsistensi agregasi belum dapat diterima (>=10%).";

        html += `<p><strong>Priorities by subcriterion (${item.criterionName}) - Agregasi</strong></p>`;
        html += `<div class='matrix-wrap'><table><thead><tr><th>Alternatif</th><th>Bobot Lokal (Angka)</th><th>Bobot Lokal (%)</th></tr></thead><tbody>`;
        state.alternatives.forEach((alt, idx) => {
          html += `<tr><td>${alt}</td><td>${fmt(item.aggResult.weights[idx])}</td><td>${fmtPct(item.aggResult.weights[idx])}</td></tr>`;
        });
        html += `</tbody></table></div>`;
        const altStatus = item.aggResult.cr <= 0.1 ? `<span class='good'>Konsisten</span>` : `<span class='warn'>Tidak konsisten</span>`;
        html += `<p class='small'>Consistency Ratio Agregasi: ${fmt(item.aggResult.cr)} (${fmtPct(item.aggResult.cr)}) -> ${altStatus}</p>`;
        html += `<p class='small'>${consistencyText}</p>`;
      });
      html += `</div>`;

      html += `<div class='result-box'><h3>Mean Priorities by Alternatives</h3>`;
      html += `<div class='matrix-wrap'><table><thead><tr><th>Crit./Alt.</th>${state.alternatives.map(alt => `<th>${alt}</th>`).join("")}</tr></thead><tbody>`;
      state.criteria.forEach((criterion, cIdx) => {
        html += `<tr><th>${criterion} (${fmtPct(aggCriteriaResult.weights[cIdx])})</th>`;
        state.alternatives.forEach((_, aIdx) => {
          html += `<td>${fmt(contributionMatrix[cIdx][aIdx] * 100, 2)}</td>`;
        });
        html += `</tr>`;
      });
      html += `<tr><th>TOTAL</th>`;
      state.alternatives.forEach((_, aIdx) => {
        html += `<th>${fmtPct(finalScores[aIdx])}</th>`;
      });
      html += `</tr></tbody></table></div>`;
      html += `<p class='small'>Ranking dihitung dari penjumlahan nilai kontribusi per kriteria (baris TOTAL).</p>`;
      html += `</div>`;

      html += `<div class='result-box'><h3>Detail Per Expert</h3>`;
      html += `<div class='tab-head'>`;
      for (let ex = 0; ex < state.nExperts; ex++) {
        html += `<button type='button' class='tab-btn' data-target='expert-tab-${ex}'>Expert ${ex + 1}</button>`;
      }
      html += `</div>`;
      for (let ex = 0; ex < state.nExperts; ex++) {
        const critRes = criteriaExpertResults[ex];
        const critStatus = critRes.cr <= 0.1 ? `<span class='good'>Konsisten</span>` : `<span class='warn'>Tidak konsisten</span>`;
        const critText = critRes.cr < 0.1
          ? "Derajat konsistensi dapat diterima (<10%), sehingga proses keputusan dapat dilanjutkan."
          : "Derajat konsistensi belum dapat diterima (>=10%), sebaiknya penilaian pairwise diulang.";

        html += `<div class='tab-panel' id='expert-tab-${ex}'>`;
        html += `<h3>Expert ${ex + 1}</h3>`;
        html += `<p><strong>Priorities by criterion</strong></p>`;
        html += `<div class='matrix-wrap'><table><thead><tr><th>Kriteria</th><th>Bobot (Angka)</th><th>Bobot (%)</th></tr></thead><tbody>`;
        state.criteria.forEach((c, i) => {
          html += `<tr><td>${c}</td><td>${fmt(critRes.weights[i])}</td><td>${fmtPct(critRes.weights[i])}</td></tr>`;
        });
        html += `</tbody></table></div>`;
        html += `<p class='small'>Consistency Ratio: ${fmt(critRes.cr)} (${fmtPct(critRes.cr)}) -> ${critStatus}</p>`;
        html += `<p class='small'>${critText}</p>`;

        const expertTotals = Array(state.nAlternatives).fill(0);
        html += `<p><strong>Priorities by Alternatives - Expert ${ex + 1}</strong></p>`;
        html += `<div class='matrix-wrap'><table><thead><tr><th>Crit./Alt.</th>${state.alternatives.map(alt => `<th>${alt}</th>`).join("")}<th>IC</th><th>CR</th></tr></thead><tbody>`;
        state.criteria.forEach((criterionName, cIdx) => {
          const altRes = altConsistencyByCriterion[cIdx].expertResults[ex];
          html += `<tr><th>${criterionName}</th>`;
          state.alternatives.forEach((_, aIdx) => {
            const v = critRes.weights[cIdx] * altRes.weights[aIdx] * 100;
            expertTotals[aIdx] += v;
            html += `<td>${fmt(v, 2)}</td>`;
          });
          html += `<td>${fmt(altRes.ci, 4)}</td><td>${fmtPct(altRes.cr)}</td></tr>`;
        });
        html += `<tr><th>TOTAL</th>`;
        expertTotals.forEach(v => {
          html += `<th>${fmt(v, 2)}%</th>`;
        });
        html += `<th>-</th><th>-</th></tr>`;
        html += `</tbody></table></div>`;
        const expertAltConsistent = state.criteria.every((_, cIdx) => altConsistencyByCriterion[cIdx].expertResults[ex].cr < 0.1);
        html += `<p class='small'>The degree of consistency is ${expertAltConsistent ? "acceptable (<10%)" : "not acceptable (>=10%)"}, therefore the decision process ${expertAltConsistent ? "can continue" : "should be reviewed"}.</p>`;

        state.criteria.forEach((criterionName, cIdx) => {
          const altRes = altConsistencyByCriterion[cIdx].expertResults[ex];
          const altStatus = altRes.cr <= 0.1 ? `<span class='good'>Konsisten</span>` : `<span class='warn'>Tidak konsisten</span>`;
          const altText = altRes.cr < 0.1
            ? "Derajat konsistensi dapat diterima (<10%), sehingga proses keputusan dapat dilanjutkan."
            : "Derajat konsistensi belum dapat diterima (>=10%), sebaiknya penilaian pairwise diulang.";

          html += `<p><strong>Priorities by subcriterion (${criterionName})</strong></p>`;
          html += `<div class='matrix-wrap'><table><thead><tr><th>Alternatif</th><th>Bobot Lokal (Angka)</th><th>Bobot Lokal (%)</th></tr></thead><tbody>`;
          state.alternatives.forEach((alt, idx) => {
            html += `<tr><td>${alt}</td><td>${fmt(altRes.weights[idx])}</td><td>${fmtPct(altRes.weights[idx])}</td></tr>`;
          });
          html += `</tbody></table></div>`;
          html += `<p class='small'>Consistency Ratio: ${fmt(altRes.cr)} (${fmtPct(altRes.cr)}) -> ${altStatus}</p>`;
          html += `<p class='small'>${altText}</p>`;
        });
        html += `</div>`;
      }
      html += `</div>`;

      resultSection.innerHTML = html;
      initExpertTabs();
      renderHierarchyViz(aggCriteriaResult.weights, finalScores);
      resultSection.scrollIntoView({ behavior: "smooth", block: "start" });
    }

    generateBtn.addEventListener("click", generateForms);
    downloadCsvBtn.addEventListener("click", downloadCsv);
    uploadCsvBtn.addEventListener("click", () => uploadCsvInput.click());
    uploadCsvInput.addEventListener("change", async (e) => {
      const file = e.target.files && e.target.files[0];
      if (!file) return;
      try {
        const text = await file.text();
        importCsvText(text);
        alert("Data CSV berhasil dimuat.");
      } catch (err) {
        alert(`Gagal membaca CSV: ${err.message}`);
      } finally {
        uploadCsvInput.value = "";
      }
    });
    generateForms();
  </script>
</body>
</html>
